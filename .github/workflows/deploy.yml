name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 最小權限：讀 repo、寫 Pages、OIDC 部署驗證，僅此而已
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci 嚴格依 lockfile 安裝——供應鏈防護的第一道鎖
      - run: npm ci

      # 部署閘門：全部測試＋覆蓋率門檻（85%）不過就不上線
      - run: npm run coverage

      - run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
